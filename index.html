<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Layerdex</title>
    <link rel="stylesheet" href="./src/styles.css">
    <link rel="stylesheet" href="./src/diagram.css">
  </head>
  <body>
    <div class="app-shell">
      <aside class="source-panel" aria-label="Model source and structure">
        <header class="brand">
          <div class="brand-mark" aria-hidden="true">Lx</div>
          <div>
            <h1>Layerdex</h1>
            <p>Local model anatomy</p>
          </div>
        </header>

        <section class="source-controls" aria-label="Model input">
          <label class="file-picker">
            <input id="fileInput" type="file" multiple webkitdirectory>
            <span>Open Local Model</span>
          </label>
          <button id="demoButton" type="button">Load Demo</button>
          <form id="hfForm" class="hf-form">
            <input id="hfInput" type="text" autocomplete="off" placeholder="org/model or Hugging Face URL">
            <button type="submit">Fetch Metadata</button>
          </form>
        </section>

        <section class="tree-section" aria-label="Semantic structure">
          <div class="panel-title">Structure</div>
          <div id="structureTree" class="structure-tree"></div>
        </section>
      </aside>

      <main class="workspace" aria-label="Layerdex workspace">
        <header class="workspace-topbar">
          <div>
            <div id="statusLine" class="status-line">Ready</div>
            <h2 id="modelTitle">No model loaded</h2>
          </div>
          <div class="top-actions">
            <button id="baselineButton" type="button">Pin Baseline</button>
            <button id="compareButton" type="button">Compare</button>
          </div>
        </header>

        <section id="metricStrip" class="metric-strip" aria-label="Model summary"></section>

        <nav id="viewTabs" class="view-tabs" aria-label="Views"></nav>
        <section id="viewCanvas" class="view-canvas" aria-live="polite"></section>
      </main>

      <aside class="detail-panel" aria-label="Selection details and exports">
        <section>
          <div class="panel-title">Selection</div>
          <div id="detailPane" class="detail-pane"></div>
        </section>

        <section>
          <div class="panel-title">Facts</div>
          <div id="factList" class="fact-list"></div>
        </section>

        <section>
          <div class="panel-title">Export</div>
          <div class="export-grid">
            <button id="exportSvg" type="button">SVG</button>
            <button id="exportPng" type="button">PNG</button>
            <button id="exportPdf" type="button">PDF</button>
            <button id="exportJson" type="button">Report</button>
          </div>
        </section>
      </aside>
    </div>

    <script type="module" src="./src/app.js"></script>
  </body>
</html>
